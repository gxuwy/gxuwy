<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="./lib/bootstrap/css/bootstrap.css" />
    <link
      rel="stylesheet"
      href="./lib/bootstrap-validator/css/bootstrapValidator.min.css"
    />
    <link rel="stylesheet" href="./lib/nprogress/nprogress.css" />
    <link rel="stylesheet" href="./css/common.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- 左侧公共栏 -->
    <div class="aside">
      <div class="one"><p>黑马over</p></div>
      <div class="user">
        <img src="./images/10.jpg" alt="" />
        <p>壮哉我太</p>
      </div>
      <div class="nav">
        <ul>
          <li>
            <a href="user.html" class="current"
              ><i class="glyphicon glyphicon-user lazy"></i>
              <span>用户管理</span></a
            >
          </li>
          <li>
            <a href="JavaScript:0" class="two"
              ><i class="glyphicon glyphicon-list lazy "></i>
              <span>分类管理</span></a
            >
            <div class="child">
              <a href="first.html"> 一级分类 </a>
              <a href="second.html"> 二级分类</a>
            </div>
          </li>
          <li>
            <a href="product.html"
              ><i class="glyphicon glyphicon-tags lazy"></i>
              <span>商品管理</span></a
            >
          </li>
          <li>
            <a href="index.html"
              ><i class="glyphicon glyphicon-home lazy"></i>
              <span>返回首页</span></a
            >
          </li>
        </ul>
      </div>
    </div>
    <!-- 上部公共栏 -->
    <div class="topad">
      <a href="JavaScript:0" class="pull-left  tl">
        <i class="glyphicon glyphicon-align-justify"></i>
      </a>
      <a href="#" class="pull-right tr">
        <i class="glyphicon glyphicon-log-out"></i>
      </a>
    </div>
    <div class="main">
      <div class="container-fluid">
        <div class="top"><a href="">管理系统</a> / 分类管理 / 一级分类</div>
        <button class="btn btn-default" id="addcate">添加分类</button>
        <div class="bottom">
          <table class="table table-bordered table-hover">
            <thead>
              <tr>
                <th>序号</th>
                <th>一级分类名</th>
              </tr>
            </thead>
            <tbody>
              <!-- 挖个坑 -->
            </tbody>
          </table>

          <!-- 3.x 版本要求是 ul -->
          <div class="pull-right"><ul id="paginator"></ul></div>
        </div>
      </div>
    </div>
    <!-- Modal -->
    <div class="modal fade" id="logoutModal" tabindex="-1">
      <div class="modal-dialog modal-sm">
        <div class="modal-content">
          <div class="modal-header">
            <button type="button" class="close" data-dismiss="modal">
              <span>&times;</span>
            </button>
            <h4 class="modal-title" id="myModalLabel">温馨提示</h4>
          </div>
          <div class="modal-body">
            <p style="color:#D2254E">
              <i class="glyphicon glyphicon-info-sign"></i
              >您确定要退出后台管理系统吗？
            </p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">
              取消
            </button>
            <button type="button" class="btn btn-primary" id="logoutBtn">
              退出
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="addModal" tabindex="-1">
            <div class="modal-dialog modal-sm">
              <div class="modal-content">
                <form action="" id="form">
                  <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">
                    </button>
                    <h4 class="modal-title">添加分类</h4>
                  </div>
                  <!-- 中间 -->
                  <div class="modal-body">
                        <div class="form-group">
                          <input type="text" name="categoryName" class="form-control" placeholder="请输入一级分类名称" />
                        </div>
                </div>
                  <!-- 底部 -->
                  <div class="modal-footer">
                        <button type="button" class="btn btn-default" data-dismiss="modal">取消 </button>
                        <button type="submit" class="btn btn-primary" id="addBtn"> 确定 </button>
                      </div>
                    </form>
              </div>
            </div>
          </div>


   

    <script type="text/html" id="firstone">
      {{each rows v i}}
      <tr>
          <td>{{i+1+(page-1)*size}}</td>
          <td>{{v.categoryName}}</td>
      </tr>
      {{/each}}
    </script>

    <script src="./lib/jquery/jquery.min.js"></script>
    <script src="./lib/bootstrap/js/bootstrap.min.js"></script>
    <script src="./lib/bootstrap-validator/js/bootstrapValidator.min.js"></script>
    <script src="./lib/artTemplate/template-web.js"></script>
    <script src="./lib/bootstrap-paginator/bootstrap-paginator.min.js"></script>
    <script src="./lib/nprogress/nprogress.js"></script>
    <script src="./js/common.js"></script>
    <script src="./js/isLogin.js"></script>
    <script src="./js/first.js"></script>
  </body>
</html>
